services:
  - type: web
    name: waypointer
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /
    envVars:
      - key: PORT
        value: 8000
      # Non-secret PKCE public-client id, forwarded by Render as a Docker
      # build arg (see Dockerfile) since Vite bakes it in at build time, not
      # runtime. Set the value in the Render dashboard, not here.
      - key: VITE_WAHOO_CLIENT_ID
        sync: false
      # Not secret - just identifies the public Tally feedback form. Same
      # build-arg forwarding as VITE_WAHOO_CLIENT_ID above (see Dockerfile).
      - key: VITE_TALLY_FORM_ID
        sync: false
